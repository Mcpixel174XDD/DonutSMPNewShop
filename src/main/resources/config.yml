# SimpleShop configuration
# ---------------------------------------------------------
# Add/remove items freely. "material" must be a valid Bukkit
# Material enum name (https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html)
# buy-price  = cost for a player to buy 'amount' of this item (set to -1 to disable buying)
# sell-price = money a player gets for selling 'amount' of this item (set to -1 to disable selling)
# amount     = how many items are given/taken per transaction
# ---------------------------------------------------------

gui:
  title: "&8&lShop"
  rows: 6                 # total rows in the GUI (6 = 54 slots). Bottom row is reserved for nav buttons.
  items-per-page: 45

messages:
  no-permission: "&cYou do not have permission to do that."
  not-enough-money: "&cYou don't have enough money for that."
  purchase-success: "&aBought &f{amount}x {item} &afor &f${price}&a."
  sell-success: "&aSold &f{amount}x {item} &afor &f${price}&a."
  inventory-full: "&cYour inventory is full!"
  no-items-to-sell: "&cYou don't have any {item} to sell."
  reload-success: "&aSimpleShop config reloaded."
  vault-missing: "&cVault economy plugin not found! Disabling shop."

